


<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Dino Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7f7f7;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation; /* Отключает двойной тап для зума */
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #535353;
            font-weight: bold;
            pointer-events: none;
        }

        .menu-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            border: 2px solid #535353;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #535353;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }

        h1 { color: #535353; margin-top: 0; }
        p { color: #777; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="score">0</div>
    
    <div id="ui">
        <div id="startMenu" class="menu-box">
            <h1>БЕГАЛКА</h1>
            <p>Нажимай на экран, чтобы прыгать</p>
            <button onclick="startGame()">ИГРАТЬ</button>
        </div>
        
        <div id="gameOverMenu" class="menu-box" style="display: none;">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <p id="finalScore"></p>
            <button onclick="startGame()">ЕЩЕ РАЗ</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startMenu = document.getElementById('startMenu');
    const gameOverMenu = document.getElementById('gameOverMenu');
    const finalScoreText = document.getElementById('finalScore');

    // Настройки игры
    let gameActive = false;
    let score = 0;
    let gameSpeed = 5;
    let gravity = 0.6;
    
    // Параметры игрока
    const player = {
        x: 50,
        y: 0,
        width: 40,
        height: 40,
        dy: 0,
        jumpForce: -12,
        grounded: false,
        color: '#535353'
    };

    let obstacles = [];
    let animationId;

    // Адаптация размера холста
    function resize() {
        canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
        canvas.height = 300;
        player.y = canvas.height - player.height;
    }

    window.addEventListener('resize', resize);
    resize();

    // Управление
    function handleInput(e) {
        if (e) e.preventDefault();
        if (gameActive && player.grounded) {
            player.dy = player.jumpForce;
            player.grounded = false;
        }
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });
    window.addEventListener('touchstart', handleInput, { passive: false });
    window.addEventListener('mousedown', handleInput);

    function startGame() {
        // Сброс состояния
        score = 0;
        gameSpeed = 5;
        obstacles = [];
        player.y = canvas.height - player.height;
        player.dy = 0;
        gameActive = true;
        
        // UI
        startMenu.style.display = 'none';
        gameOverMenu.style.display = 'none';
        scoreElement.textContent = '0';
        
        if (animationId) cancelAnimationFrame(animationId);
        update();
    }

    function createObstacle() {
        const height = 30 + Math.random() * 30;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - height,
            width: 20,
            height: height,
            color: '#ff4d4d'
        });
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Физика игрока
        player.dy += gravity;
        player.y += player.dy;

        // Коллизия с землей
        if (player.y > canvas.height - player.height) {
            player.y = canvas.height - player.height;
            player.dy = 0;
            player.grounded = true;
        }

        // Отрисовка игрока
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Линия земли
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.stroke();

        // Препятствия
        if (Math.random() < 0.02) {
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 200) {
                createObstacle();
            }
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= gameSpeed;

            // Отрисовка
            ctx.fillStyle = o.color;
            ctx.fillRect(o.x, o.y, o.width, o.height);

            // Проверка столкновения
            if (
                player.x < o.x + o.width &&
                player.x + player.width > o.x &&
                player.y < o.y + o.height &&
                player.y + player.height > o.y
            ) {
                gameOver();
            }

            // Удаление старых препятствий
            if (o.x + o.width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.textContent = score;
                gameSpeed += 0.1; // Постепенное ускорение
            }
        }

        animationId = requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        gameOverMenu.style.display = 'block';
        finalScoreText.textContent = "Ваш счет: " + score;
        cancelAnimationFrame(animationId);
    }

</script>
</body>
</html>
